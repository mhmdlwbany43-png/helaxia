<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELAXIA - منتجات القسم</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 10% 20%, #2A4A6A, #1A3A50);
            min-height: 100vh;
            padding: 2rem;
        }
        .glass-card {
            background: rgba(20, 35, 45, 0.35);
            backdrop-filter: blur(18px);
            border-radius: 28px;
            border: 1px solid rgba(200, 220, 250, 0.25);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        h1, h2 { color: #C0E0FF; margin-bottom: 1rem; }
        .btn-add, .btn-back {
            background: rgba(90, 140, 170, 0.6);
            border: 1px solid #C0E0FF;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            color: #E0E8F0;
            margin-bottom: 1rem;
            display: inline-block;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        .product-card {
            background: rgba(20, 35, 45, 0.5);
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
        }
        .product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 16px; }
        .btn-delete { background: rgba(200, 100, 100, 0.5); border: none; border-radius: 40px; padding: 0.2rem 0.8rem; cursor: pointer; margin-top: 0.5rem; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: rgba(20, 35, 45, 0.95);
            border-radius: 28px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            border: 1px solid #C0E0FF;
        }
        input { width: 100%; padding: 0.6rem; margin: 0.5rem 0; background: rgba(255,255,255,0.1); border: 1px solid #C0E0FF; border-radius: 20px; color: #E0E8F0; }
    </style>
</head>
<body>
    <button class="btn-back" onclick="window.location.href='/admin'">← رجوع للوحة الرئيسية</button>
    <div class="glass-card">
        <h1 id="categoryTitle">منتجات القسم</h1>
        <button class="btn-add" onclick="openAddProductModal()">+ إضافة منتج إلى هذا القسم</button>
        <div id="productsGrid" class="products-grid">جاري التحميل...</div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3>إضافة منتج</h3>
            <input type="text" id="pName" placeholder="اسم المنتج">
            <input type="number" id="pPrice" placeholder="السعر">
            <input type="text" id="pImage" placeholder="رابط الصورة">
            <button onclick="addProduct()">إضافة</button>
            <button onclick="closeModal()">إلغاء</button>
        </div>
    </div>

    <script>
        const adminToken = localStorage.getItem('adminToken');
        if (!adminToken && !localStorage.getItem('token')) window.location.href = '/admin-login.html';

        const categoryId = localStorage.getItem('currentCategoryId');
        const categoryName = localStorage.getItem('currentCategoryName');
        if (!categoryId) window.location.href = '/admin';
        document.getElementById('categoryTitle').innerText = `📁 ${categoryName} - المنتجات`;

        async function loadProducts() {
            const res = await fetch(`/api/products/by-category/${categoryId}`);
            const products = await res.json();
            const container = document.getElementById('productsGrid');
            if (products.length === 0) {
                container.innerHTML = '<div class="empty-state glass-card">✨ لا توجد منتجات في هذا القسم ✨</div>';
                return;
            }
            container.innerHTML = products.map(p => `
                <div class="product-card glass-card">
                    <img src="${p.image_url || 'https://placehold.co/200x150/2A4A6A/C0E0FF?text=Product'}" onerror="this.src='https://placehold.co/200x150/2A4A6A/C0E0FF?text=Product'">
                    <div style="margin-top:0.5rem;"><strong>${p.name}</strong></div>
                    <div>${p.base_price} ل.س</div>
                    <button class="btn-delete" onclick="deleteProduct(${p.id})">🗑️ حذف من القسم</button>
                </div>
            `).join('');
        }

        async function deleteProduct(productId) {
            if (confirm('هل أنت متأكد؟')) {
                // هنا يمكن تحديث المنتج ليكون category_id = 0
                await fetch(`/api/products/${productId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category_id: 0 })
                });
                loadProducts();
            }
        }

        function openAddProductModal() { document.getElementById('productModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('productModal').style.display = 'none'; }

        async function addProduct() {
            const product = {
                name: document.getElementById('pName').value,
                base_price: parseInt(document.getElementById('pPrice').value),
                image_url: document.getElementById('pImage').value,
                category_id: parseInt(categoryId)
            };
            await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(product)
            });
            closeModal();
            loadProducts();
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pImage').value = '';
        }

        loadProducts();
    </script>
</body>
</html>
