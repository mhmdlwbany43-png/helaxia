<script>
    let currentCurrency = localStorage.getItem('helaxia_currency') || 'SYP';
    let exchangeRate = 13000;
    let currentGalleryImages = [];
    let currentGalleryIndex = 0;
    
    async function loadExchangeRate() {
        try {
            const res = await fetch('/api/settings');
            const settings = await res.json();
            if (settings.exchange_rate) exchangeRate = parseFloat(settings.exchange_rate);
        } catch(e) { console.error(e); }
    }
    
    function formatPrice(priceSYP) {
        const price = parseFloat(priceSYP);
        if (isNaN(price)) return '0 ل.س';
        if (currentCurrency === 'USD') return `${(price / exchangeRate).toFixed(2)} $`;
        return `${price} ل.س`;
    }
    
    function updateAllPrices() {
        document.querySelectorAll('.price-value').forEach(el => {
            const syp = el.getAttribute('data-syp');
            if (syp) el.innerHTML = formatPrice(parseFloat(syp));
        });
        const ct = document.getElementById('globalCurrencyText');
        if (ct) ct.innerText = currentCurrency === 'USD' ? '$' : 'ل.س';
    }
    
    function toggleGlobalCurrency() {
        currentCurrency = currentCurrency === 'SYP' ? 'USD' : 'SYP';
        localStorage.setItem('helaxia_currency', currentCurrency);
        updateAllPrices();
    }
    
    function openGallery(images, startIndex) {
        if (!images || images.length === 0) return;
        currentGalleryImages = images;
        currentGalleryIndex = startIndex || 0;
        const galleryImg = document.getElementById('galleryImage');
        const counter = document.getElementById('galleryCounter');
        if (!galleryImg) return;
        galleryImg.src = images[currentGalleryIndex];
        if (counter) counter.innerText = `${currentGalleryIndex + 1} / ${images.length}`;
        document.getElementById('galleryModal').style.display = 'flex';
    }
    
    function closeGallery() {
        document.getElementById('galleryModal').style.display = 'none';
        currentGalleryImages = [];
        currentGalleryIndex = 0;
    }
    
    function nextGalleryImage() {
        if (currentGalleryImages.length === 0) return;
        currentGalleryIndex = (currentGalleryIndex + 1) % currentGalleryImages.length;
        document.getElementById('galleryImage').src = currentGalleryImages[currentGalleryIndex];
        document.getElementById('galleryCounter').innerText = `${currentGalleryIndex + 1} / ${currentGalleryImages.length}`;
    }
    
    function prevGalleryImage() {
        if (currentGalleryImages.length === 0) return;
        currentGalleryIndex = (currentGalleryIndex - 1 + currentGalleryImages.length) % currentGalleryImages.length;
        document.getElementById('galleryImage').src = currentGalleryImages[currentGalleryIndex];
        document.getElementById('galleryCounter').innerText = `${currentGalleryIndex + 1} / ${currentGalleryImages.length}`;
    }
    
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = '/login';
    
    // ✅ createStars(), cart, updateCartCount(), addToCart(), showToast(), logout() محذوفة (موجودة في shared.js)
    
    let currentProduct = null;
    
    function openProductModal(p) {
        console.log('openProductModal called with:', p);
        currentProduct = p;
        const formattedPrice = formatPrice(p.price);
        let firstImage = (p.images && p.images.length > 0) ? p.images[0] : (p.image || 'https://placehold.co/400x400/2A4A6A/7BA5C0?text=HELAXIA');
        let imagesCount = (p.images && p.images.length > 0) ? p.images.length : (p.image ? 1 : 0);
        
        document.getElementById('productModalBody').innerHTML = `
            <div style="position:relative; cursor:pointer;" onclick="openGalleryFromModal()">
                <img src="${firstImage}" class="modal-img" onerror="this.src='https://placehold.co/400x400/2A4A6A/7BA5C0?text=HELAXIA'">
                ${imagesCount > 1 ? `<div style="position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.6); border-radius:20px; padding:2px 8px; font-size:0.7rem;">${imagesCount} صور</div>` : ''}
            </div>
            <div class="modal-title">${p.name}</div>
            <div class="modal-price">السعر: ${formattedPrice}</div>
            <div class="modal-detail">نوع القماش: ${p.fabric_type || 'غير محدد'}</div>
            <div class="modal-detail">القياسات: ${p.sizes || 'غير محدد'}</div>
            <div class="modal-detail">الألوان: ${p.colors || 'غير محدد'}</div>
            <div class="modal-detail">الوصف: ${p.description || 'لا يوجد وصف'}</div>
        `;
        document.getElementById('productModal').style.display = 'flex';
    }
    
    function openGalleryFromModal() {
        console.log('openGalleryFromModal - currentProduct:', currentProduct);
        if (!currentProduct) {
            console.error('currentProduct is null, cannot open gallery');
            return;
        }
        if (currentProduct.images && currentProduct.images.length > 0) {
            const imagesToShow = [...currentProduct.images];
            closeProductModal();
            openGallery(imagesToShow, 0);
        } else if (currentProduct.image) {
            closeProductModal();
            openGallery([currentProduct.image], 0);
        } else {
            console.error('No images found in product');
        }
    }
    
    function closeProductModal() { 
        document.getElementById('productModal').style.display = 'none'; 
        currentProduct = null; 
    }
    
    function addToCartFromModal() { 
        if (currentProduct) { 
            addToCart(currentProduct); 
            closeProductModal(); 
        } 
    }
    
    async function loadSlider() { 
        let res = await fetch('/api/products'); 
        let products = await res.json(); 
        let featured = products.filter(p=>p.is_featured===1).slice(0,4); 
        let track = document.getElementById('sliderTrack'); 
        if(featured.length===0){
            track.innerHTML='<div class="slider-slide"><img src="https://placehold.co/1200x400/2A4A6A/7BA5C0?text=HELAXIA"></div>';
            return;
        } 
        track.innerHTML=featured.map(p=>{
            let img = (p.images && p.images.length > 0) ? p.images[0] : (p.image_url || 'https://placehold.co/1200x400/2A4A6A/7BA5C0?text=HELAXIA');
            return `<div class="slider-slide"><img src="${img}"></div>`;
        }).join(''); 
        let c=0; 
        setInterval(()=>{c=(c+1)%featured.length; track.style.transform=`translateX(-${c*100}%)`;},5000); 
    }
    
    async function loadSections() {
        let res = await fetch('/api/categories/all');
        let allCats = await res.json();
        let subCategories = allCats.filter(c => c.parent_id !== 0);
        let container = document.getElementById('sectionsContainer');
        container.innerHTML = '';
        if (subCategories.length === 0) { 
            container.innerHTML = '<div class="empty-state glass-card">لا توجد أقسام فرعية بعد</div>'; 
            return; 
        }
        let storesRes = await fetch('/api/stores');
        let stores = await storesRes.json();
        let storeNames = {};
        stores.forEach(s => { storeNames[s.id] = s.name; });
        
        for (let sub of subCategories) {
            let prodRes = await fetch(`/api/products/by-category/${sub.id}`);
            let products = await prodRes.json();
            if (products.length === 0) continue;
            
            container.innerHTML += `<div class="section">
                <div class="section-header">
                    <div class="section-title">${sub.name}</div>
                    <div class="section-arrow" onclick="window.location.href='/section?id=${sub.id}&name=${encodeURIComponent(sub.name)}'">عرض الكل →</div>
                </div>
                <div class="carousel-container" id="carousel-${sub.id}">
                    <div class="carousel-track" id="track-${sub.id}"></div>
                    <div class="carousel-btn prev" onclick="slideCarousel('${sub.id}',-1)"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg></div>
                    <div class="carousel-btn next" onclick="slideCarousel('${sub.id}',1)"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M9 18l6-6-6-6"/></svg></div>
                    <div class="carousel-progress"><div class="progress-bar"></div></div>
                </div>
            </div>`;
            
            let track = document.getElementById(`track-${sub.id}`);
            if (products.length === 0) {
                track.innerHTML = '<div class="empty-state" style="padding:1rem;">لا توجد منتجات في هذا القسم بعد</div>';
            } else {
                track.innerHTML = products.map(p => {
                    let firstImage = (p.images && p.images.length > 0) ? p.images[0] : (p.image_url || 'https://placehold.co/400x400/2A4A6A/7BA5C0?text=HELAXIA');
                    let imagesArray = (p.images && p.images.length > 0) ? p.images : (p.image_url ? [p.image_url] : []);
                    return `
                        <div class="product-card">
                            <div class="glass-card">
                                <div class="fifa-top" onclick='openProductModal({id:${p.id}, name:${JSON.stringify(p.name)}, price:${p.base_price}, image:"${firstImage}", images:${JSON.stringify(imagesArray)}, fabric_type:${JSON.stringify(p.fabric_type || '')}, sizes:${JSON.stringify(p.sizes || '')}, colors:${JSON.stringify(p.colors || '')}, description:${JSON.stringify(p.description || '')}})'>
                                    <div class="fifa-image"><img src="${firstImage}"></div>
                                    <div class="fifa-info">
                                        <div class="fifa-name">${p.name}</div>
                                        <div class="fifa-detail">نوع القماش: ${p.fabric_type || 'غير محدد'}</div>
                                        <div class="fifa-detail">القياسات: ${p.sizes || 'غير محدد'}</div>
                                        <div class="fifa-detail">الألوان: ${p.colors || 'غير محدد'}</div>
                                    </div>
                                </div>
                                <div class="fifa-bottom">
                                    <div class="fifa-price price-value" data-syp="${p.base_price}">${formatPrice(p.base_price)}</div>
                                    <div class="fifa-store">${storeNames[p.store_id] || 'HELAXIA'}</div>
                                </div>
                                <button class="add-to-cart" onclick="addToCart({id:${p.id}, name:'${p.name}', price:${p.base_price}, image:'${firstImage}'})">+ أضف إلى السلة</button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            window.indices = window.indices || {};
            window.indices[sub.id] = 0;
            startAutoSlide(sub.id);
        }
        updateAllPrices();
    }
    
    function startAutoSlide(catId) { 
        setInterval(() => { 
            let track = document.getElementById(`track-${catId}`); 
            if(!track) return; 
            let total = track.children.length; 
            if(total<=1) return; 
            let container = track.closest('.carousel-container'); 
            let cloud = container.querySelector('.smoke-cloud'); 
            if(!cloud){
                let c=document.createElement('div'); 
                c.className='smoke-cloud'; 
                container.appendChild(c); 
                cloud=c;
            } 
            let progressBar = container.querySelector('.progress-bar');
            if (progressBar) {
                progressBar.style.transition = 'none';
                progressBar.style.width = '0%';
                setTimeout(() => { progressBar.style.transition = 'width 5s linear'; progressBar.style.width = '100%'; }, 10);
            }
            cloud.style.animation='none'; 
            cloud.offsetHeight; 
            cloud.style.animation='smokePass 1.2s forwards'; 
            setTimeout(()=>{ 
                let idx=(window.indices[catId]+1)%total; 
                window.indices[catId]=idx; 
                let w=track.children[0]?.offsetWidth+24; 
                if(w) track.style.transform=`translateX(-${idx*w}px)`;
                if (progressBar) {
                    setTimeout(() => {
                        progressBar.style.transition = 'none';
                        progressBar.style.width = '0%';
                        setTimeout(() => { progressBar.style.transition = 'width 5s linear'; progressBar.style.width = '100%'; }, 10);
                    }, 100);
                }
            },250); 
        },5000); 
    }
    
    function slideCarousel(catId, dir) { 
        let idx=(window.indices[catId]||0)+dir; 
        let track=document.getElementById(`track-${catId}`); 
        if(!track) return; 
        let total=track.children.length; 
        if(total===0) return; 
        idx=(idx+total)%total; 
        window.indices[catId]=idx; 
        let w=track.children[0]?.offsetWidth+24; 
        if(w) track.style.transform=`translateX(-${idx*w}px)`; 
    }
    
    function vendorAction() {
        const user = JSON.parse(localStorage.getItem('user'));
        const vendorToken = localStorage.getItem('vendorToken');
        if (vendorToken && user && user.role === 'vendor') window.location.href = '/vendor/dashboard';
        else if (user) window.location.href = '/vendor-apply';
        else window.location.href = '/vendor-login';
    }
    
    // ========== نظام المدن والفلترة ==========
    let selectedCityId = 0;
    let currentCityFilter = 0;
    
    async function loadCities() {
        try {
            const res = await fetch('/api/cities');
            const cities = await res.json();
            const dropdown = document.getElementById('cityDropdown');
            cities.forEach(city => {
                const div = document.createElement('div');
                div.className = 'city-dropdown-item';
                div.setAttribute('data-city-id', city.id);
                div.setAttribute('data-city-name', city.name);
                div.innerHTML = `📍 ${city.name}`;
                div.onclick = () => selectCity(city.id, city.name);
                dropdown.appendChild(div);
            });
        } catch(e) { console.error('Error loading cities:', e); }
    }
    
    function toggleCityDropdown() {
        const dropdown = document.getElementById('cityDropdown');
        dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
    }
    
    function selectCity(cityId, cityName) {
        selectedCityId = cityId;
        document.getElementById('selectedCityName').innerText = cityName;
        document.getElementById('cityDropdown').style.display = 'none';
        
        // حفظ المدينة المختارة في localStorage
        localStorage.setItem('selectedCity', JSON.stringify({ id: cityId, name: cityName }));
        
        // إخفاء رسالة التحذير إذا اختار مدينة
        const warning = document.getElementById('warningBanner');
        if (warning) warning.style.display = 'none';
        
        // إعادة تحميل الأقسام مع الفلترة
        currentCityFilter = cityId;
        reloadSectionsWithFilter();
    }
    
    async function reloadSectionsWithFilter() {
        const container = document.getElementById('sectionsContainer');
        container.innerHTML = '<div class="empty-state glass-card">جاري التحميل...</div>';
        
        try {
            let allCatsRes = await fetch('/api/categories/all');
            let allCats = await allCatsRes.json();
            let subCategories = allCats.filter(c => c.parent_id !== 0);
            
            if (subCategories.length === 0) {
                container.innerHTML = '<div class="empty-state glass-card">لا توجد أقسام</div>';
                return;
            }
            
            let storesRes = await fetch('/api/stores');
            let stores = await storesRes.json();
            let storeNames = {};
            stores.forEach(s => { storeNames[s.id] = s.name; });
            
            // جلب المتاجر حسب المدينة (للتحقق من city_id)
            let storesByCity = [];
            if (currentCityFilter > 0) {
                let filteredStoresRes = await fetch(`/api/stores?city_id=${currentCityFilter}`);
                storesByCity = await filteredStoresRes.json();
            }
            
            container.innerHTML = '';
            
            for (let sub of subCategories) {
                let prodRes = await fetch(`/api/products/by-category/${sub.id}`);
                let products = await prodRes.json();
                
                // تصفية المنتجات حسب المدينة
                let filteredProducts = products.filter(p => {
                    if (p.is_global === 1) return true; // المنتجات العامة تظهر للجميع
                    if (currentCityFilter === 0) return true; // إذا لم يختر مدينة، يظهر كل شيء
                    // نتحقق من المتجر التابع للمنتج
                    const store = stores.find(s => s.id === p.store_id);
                    return store && store.city_id == currentCityFilter;
                });
                
                if (filteredProducts.length === 0) continue;
                
                container.innerHTML += `<div class="section">
                    <div class="section-header">
                        <div class="section-title">${sub.name}</div>
                        <div class="section-arrow" onclick="window.location.href='/section?id=${sub.id}&name=${encodeURIComponent(sub.name)}'">عرض الكل →</div>
                    </div>
                    <div class="carousel-container" id="carousel-${sub.id}">
                        <div class="carousel-track" id="track-${sub.id}"></div>
                        <div class="carousel-btn prev" onclick="slideCarousel('${sub.id}',-1)"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg></div>
                        <div class="carousel-btn next" onclick="slideCarousel('${sub.id}',1)"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M9 18l6-6-6-6"/></svg></div>
                        <div class="carousel-progress"><div class="progress-bar"></div></div>
                    </div>
                </div>`;
                
                let track = document.getElementById(`track-${sub.id}`);
                track.innerHTML = filteredProducts.map(p => {
                    let firstImage = (p.images && p.images.length > 0) ? p.images[0] : (p.image_url || 'https://placehold.co/400x400/2A4A6A/7BA5C0?text=HELAXIA');
                    let imagesArray = (p.images && p.images.length > 0) ? p.images : (p.image_url ? [p.image_url] : []);
                    return `
                        <div class="product-card">
                            <div class="glass-card">
                                <div class="fifa-top" onclick='openProductModal({id:${p.id}, name:${JSON.stringify(p.name)}, price:${p.base_price}, image:"${firstImage}", images:${JSON.stringify(imagesArray)}, fabric_type:${JSON.stringify(p.fabric_type || '')}, sizes:${JSON.stringify(p.sizes || '')}, colors:${JSON.stringify(p.colors || '')}, description:${JSON.stringify(p.description || '')}})'>
                                    <div class="fifa-image"><img src="${firstImage}"></div>
                                    <div class="fifa-info">
                                        <div class="fifa-name">${p.name}</div>
                                        <div class="fifa-detail">نوع القماش: ${p.fabric_type || 'غير محدد'}</div>
                                        <div class="fifa-detail">القياسات: ${p.sizes || 'غير محدد'}</div>
                                        <div class="fifa-detail">الألوان: ${p.colors || 'غير محدد'}</div>
                                    </div>
                                </div>
                                <div class="fifa-bottom">
                                    <div class="fifa-price price-value" data-syp="${p.base_price}">${formatPrice(p.base_price)}</div>
                                    <div class="fifa-store">${storeNames[p.store_id] || 'HELAXIA'}</div>
                                </div>
                                <button class="add-to-cart" onclick="addToCart({id:${p.id}, name:'${p.name}', price:${p.base_price}, image:'${firstImage}'})">+ أضف إلى السلة</button>
                            </div>
                        </div>
                    `;
                }).join('');
                
                window.indices = window.indices || {};
                window.indices[sub.id] = 0;
                startAutoSlide(sub.id);
            }
            
            updateAllPrices();
            
            // إذا لم يظهر أي منتج
            if (container.innerHTML === '' || container.innerHTML.includes('جاري التحميل')) {
                container.innerHTML = '<div class="empty-state glass-card">✨ لا توجد منتجات في هذه المدينة بعد ✨<br><span style="font-size:0.8rem;">💡 يمكنك تغيير المدينة من القائمة أعلاه</span></div>';
            }
            
        } catch(e) {
            console.error('Error reloading sections:', e);
            container.innerHTML = '<div class="empty-state glass-card">خطأ في تحميل البيانات</div>';
        }
    }
    
    async function init() {
        await loadExchangeRate();
        const saved = localStorage.getItem('helaxia_currency');
        if (saved === 'USD' || saved === 'SYP') currentCurrency = saved;
        updateCartCount();
        await loadCities();
        await loadSlider();
        
        // التحقق من وجود مدينة مختارة مسبقاً
        const savedCity = localStorage.getItem('selectedCity');
        if (savedCity) {
            try {
                const city = JSON.parse(savedCity);
                selectedCityId = city.id;
                document.getElementById('selectedCityName').innerText = city.name;
                currentCityFilter = city.id;
                await reloadSectionsWithFilter();
            } catch(e) { await loadSections(); }
        } else {
            await loadSections();
            const warning = document.getElementById('warningBanner');
            if (warning) warning.style.display = 'block';
        }
        
        const ct = document.getElementById('globalCurrencyText');
        if (ct) ct.innerText = currentCurrency === 'USD' ? '$' : 'ل.س';
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeGallery(); closeProductModal(); } });
        
        // إغلاق القائمة عند النقر خارجها
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('cityDropdown');
            const btn = document.getElementById('cityFilterBtn');
            if (dropdown && btn && !btn.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.style.display = 'none';
            }
        });
    }
    
    init();
</script>
