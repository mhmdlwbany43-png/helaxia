    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Playfair Display', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 10% 20%, #2A4A6A, #1A3A50);
            min-height: 100vh;
            direction: rtl;
            position: relative;
        }
        .star {
            position: fixed;
            background: radial-gradient(circle, #FFFFFF, #C0E0FF);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            z-index: 0;
            animation: twinkle 4s infinite ease-in-out;
        }
        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 0.9; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(0.8); }
        }
        .glass-nav { background: rgba(10,20,30,0.45); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(200,220,250,0.3); }
        .glass-card { background: rgba(20,35,45,0.35); backdrop-filter: blur(18px); border-radius: 28px; border: 1px solid rgba(200,220,250,0.25); transition: all 0.3s ease; }
        .glass-card:hover { border-color: rgba(200,220,250,0.6); box-shadow: 0 0 28px rgba(192,224,255,0.4); transform: translateY(-5px); }
        .navbar { position: fixed; top: 0; left: 0; width: 100%; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2rem; background: linear-gradient(135deg, #F0F4FA, #C0D0E0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-icons { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .nav-icon { cursor: pointer; transition: 0.2s; background: rgba(10,20,30,0.3); padding: 0.4rem 1rem; border-radius: 40px; color: #E0E8F0; position: relative; display: flex; align-items: center; gap: 0.3rem; }
        .nav-icon:hover { background: rgba(192,224,255,0.15); transform: scale(1.02); box-shadow: 0 0 12px #C0E0FF; }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #C0E0FF;
            color: #1A3A50;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-svg {
            width: 20px;
            height: 20px;
            stroke: #C0D0E0;
            stroke-width: 1.5;
            fill: none;
        }
        .currency-toggle {
            background: rgba(196, 148, 92, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(196, 148, 92, 0.5);
            padding: 0.3rem 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .currency-toggle:hover {
            background: rgba(196, 148, 92, 0.4);
            border-color: #c4905c;
            box-shadow: 0 0 12px rgba(196, 148, 92, 0.6);
        }
        .stores-container { max-width: 1000px; margin: 0 auto; padding: 7rem 2rem 2rem; }
        .store-card { margin-bottom: 2rem; padding: 1.5rem; }
        .store-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .store-info { display: flex; align-items: center; gap: 1rem; }
        .store-logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        .store-name { font-size: 1.3rem; font-weight: bold; color: #E0E8F0; }
        .store-rating { color: #C0E0FF; font-size: 0.85rem; margin-top: 0.2rem; }
        .store-arrow { font-size: 1.5rem; color: #C0E0FF; cursor: pointer; background: rgba(192,224,255,0.1); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.2s; }
        .store-arrow:hover { background: rgba(192,224,255,0.4); transform: scale(1.08); box-shadow: 0 0 15px #C0E0FF; }
        .store-products { margin-top: 1rem; }
        .products-track { display: flex; gap: 1rem; overflow-x: auto; scroll-behavior: smooth; padding: 0.5rem 0; }
        .products-track::-webkit-scrollbar { display: none; }
        .mini-product { min-width: 160px; padding: 0.8rem; text-align: center; cursor: pointer; }
        .mini-product img { width: 100%; height: 120px; object-fit: cover; border-radius: 16px; transition: 0.2s; }
        .mini-product:hover img { transform: scale(1.02); }
        .mini-product-title { font-size: 0.8rem; margin-top: 0.5rem; color: #E0E8F0; }
        .mini-product-price { font-size: 0.75rem; color: #C0E0FF; }
        .empty-stores { text-align: center; padding: 3rem; }
        
        /* ========== نظام المدن ========== */
        .city-filter { position: relative; }
        .city-dropdown {
            position: absolute;
            top: 55px;
            right: 0;
            background: rgba(20,35,45,0.95);
            backdrop-filter: blur(14px);
            border-radius: 20px;
            border: 1px solid rgba(200,220,250,0.3);
            min-width: 180px;
            z-index: 200;
            overflow: hidden;
        }
        .city-dropdown-item {
            padding: 0.8rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #C0D0E0;
            border-bottom: 1px solid rgba(200,220,250,0.1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .city-dropdown-item:hover {
            background: rgba(192,224,255,0.15);
            color: #C0E0FF;
        }
        .city-dropdown-item:last-child { border-bottom: none; }
        .warning-banner {
            background: linear-gradient(135deg, rgba(255,165,0,0.2), rgba(255,100,0,0.1));
            border: 1px solid #FFA500;
            border-radius: 60px;
            padding: 0.8rem 1.5rem;
            margin: 1rem auto;
            text-align: center;
            max-width: 600px;
            backdrop-filter: blur(8px);
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0% { box-shadow: 0 0 5px rgba(255,165,0,0.3); border-color: #FFA500; }
            50% { box-shadow: 0 0 20px rgba(255,165,0,0.8); border-color: #FFD700; }
            100% { box-shadow: 0 0 5px rgba(255,165,0,0.3); border-color: #FFA500; }
        }
        
        /* تحسين التجاوب مع الشاشات الصغيرة */
        @media (max-width: 768px) { 
            .store-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .nav-icons { gap: 0.5rem; }
            .navbar { padding: 0.8rem 1rem; }
            .logo { font-size: 1.3rem; }
            .stores-container { padding: 6rem 1rem 1rem; }
            .store-card { padding: 1rem; }

        @media (max-width: 480px) {
            .nav-icon span:not(.cart-count) { font-size: 0.7rem; }
            .nav-icon { padding: 0.2rem 0.5rem; }
            .store-name { font-size: 1rem; }
            .mini-product { min-width: 120px; }
            .mini-product img { height: 90px; }

<body>
<div id="stars"></div>
<nav class="navbar glass-nav">
    <div class="logo">HELAXIA</div>
    <div class="nav-icons">
        <div class="nav-icon" onclick="window.location.href='/shop'">المتجر</div>
        <div class="nav-icon" onclick="window.location.href='/cart.html'">
            <svg class="icon-svg" viewBox="0 0 24 24" stroke="currentColor" style="width:20px;height:20px;display:inline;"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <span id="cartCount" class="cart-count">0</span>
        </div>
        
        <!-- زر فلتر المدن -->
        <div class="nav-icon city-filter" id="cityFilterBtn" onclick="toggleCityDropdown()">
            <svg class="icon-svg" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 2v4M12 22v-4M4 12H2M22 12h-2"/><circle cx="12" cy="12" r="4"/><path d="M6 6l2 2M18 18l2 2M18 6l2-2M6 18l2-2"/></svg>
            <span id="selectedCityName">اختر مدينتك</span>
            <svg class="icon-svg" viewBox="0 0 24 24" stroke="currentColor" style="width:16px;"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div id="cityDropdown" class="city-dropdown" style="display: none;">
            <div class="city-dropdown-item" data-city-id="0" onclick="selectCity(0, 'كل المدن')">🌍 كل المدن</div>
        </div>
        
        <div class="nav-icon currency-toggle" onclick="toggleGlobalCurrency()">
            <svg class="icon-svg" viewBox="0 0 24 24" stroke="currentColor" style="width:20px;height:20px;display:inline;">
                <path d="M3 12h18M12 3v18M9 6l3-3 3 3M9 18l3 3 3-3"/>
            </svg>
            <span id="globalCurrencyText">ل.س</span>
        </div>
        <div class="nav-icon" onclick="logout()">
            <svg class="icon-svg" viewBox="0 0 24 24" stroke="currentColor" style="width:20px;height:20px;display:inline;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </div>
    </div>
</nav>

<!-- رسالة تحذير توهجية -->
<div id="warningBanner" class="warning-banner" style="display: none;">
    ✨ يرجى اختيار مدينتك من القائمة أعلاه لتظهر لك المتاجر المناسبة لموقعك ✨
</div>

<div class="stores-container" id="storesContainer">جاري تحميل المتاجر...</div>

<script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = '/login';
    
    function logout() { localStorage.clear(); window.location.href = '/login'; }
    
    function createStars() {
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            let star = document.createElement('div');
            star.classList.add('star');
            star.style.width = (Math.random() * 4 + 1) + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = Math.random() * 3 + 2 + 's';
            starsContainer.appendChild(star);
        }
    }
    createStars();
    
    let cart = JSON.parse(localStorage.getItem('helaxia_cart')) || [];
    function updateCartCount() { 
        let count = cart.reduce((s,i)=>s+i.quantity,0); 
        const cartCountSpan = document.getElementById('cartCount');
        if (cartCountSpan) cartCountSpan.innerText = count;
    }
    
    // ========== نظام المدن والفلترة ==========
    let selectedCityId = 0;
    let currentCityFilter = 0;
    let allStoresData = [];
    
    async function loadCities() {
        try {
            const res = await fetch('/api/cities');
            const cities = await res.json();
            const dropdown = document.getElementById('cityDropdown');
            cities.forEach(city => {
                const div = document.createElement('div');
                div.className = 'city-dropdown-item';
                div.setAttribute('data-city-id', city.id);
                div.setAttribute('data-city-name', city.name);
                div.innerHTML = `📍 ${city.name}`;
                div.onclick = () => selectCity(city.id, city.name);
                dropdown.appendChild(div);
            });
        } catch(e) { console.error('Error loading cities:', e); }
    }
    
    function toggleCityDropdown() {
        const dropdown = document.getElementById('cityDropdown');
        dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
    }
    
    function selectCity(cityId, cityName) {
        selectedCityId = cityId;
        document.getElementById('selectedCityName').innerText = cityName;
        document.getElementById('cityDropdown').style.display = 'none';
        
        // حفظ الاختيار في localStorage
        localStorage.setItem('selectedCity', JSON.stringify({ id: cityId, name: cityName }));
        
        // إخفاء رسالة التحذير إذا اختار مدينة
        const warning = document.getElementById('warningBanner');
        if (warning && cityId !== 0) warning.style.display = 'none';
        
        // إعادة تحميل المتاجر مع الفلترة
        currentCityFilter = cityId;
        loadStores();
    }
    
    async function loadStores() {
        try {
            // جلب المتاجر من الـ API مع فلترة حسب المدينة
            let url = '/api/stores';
            if (currentCityFilter > 0) {
                url = `/api/stores?city_id=${currentCityFilter}`;
            }
            const res = await fetch(url);
            const stores = await res.json();
            const container = document.getElementById('storesContainer');
            
            if (stores.length === 0) {
                if (currentCityFilter > 0) {
                    container.innerHTML = '<div class="empty-stores glass-card">✨ لا توجد متاجر في هذه المدينة بعد ✨<br><span style="font-size:0.8rem;">💡 يمكنك تغيير المدينة من القائمة أعلاه</span></div>';
                } else {
                    container.innerHTML = '<div class="empty-stores glass-card">✨ لا توجد متاجر بعد ✨<br><span style="font-size:0.8rem;">💡 اختر مدينتك من القائمة أعلاه</span></div>';
                    const warning = document.getElementById('warningBanner');
                    if (warning && currentCityFilter === 0) warning.style.display = 'block';
                }
                return;
            }
            
            // إخفاء رسالة التحذير إذا وجدت متاجر
            const warning = document.getElementById('warningBanner');
            if (warning) warning.style.display = 'none';
            
            container.innerHTML = stores.map(store => `
                <div class="store-card glass-card">
                    <div class="store-header">
                        <div class="store-info">
                            <img class="store-logo" src="${store.logo || 'https://placehold.co/60x60/2A4A6A/C0E0FF?text=Store'}" alt="شعار ${store.name}">
                            <div><div class="store-name">${store.name}</div><div class="store-rating">⭐ ${store.rating || 4.5}</div></div>
                        </div>
                        <div class="store-arrow" onclick="window.location.href='/store/${store.slug}'">→</div>
                    </div>
                    <div class="store-products"><div class="products-track" id="track-${store.id}"><div class="loading-products">جاري التحميل...</div></div></div>
                </div>
            `).join('');
            
            for (let store of stores) {
                const prodRes = await fetch(`/api/stores/${store.slug}/products`);
                const products = await prodRes.json();
                const track = document.getElementById(`track-${store.id}`);
                if (!track) continue;
                if (products.length === 0) track.innerHTML = '<div class="mini-product">لا توجد منتجات</div>';
                else track.innerHTML = products.slice(0, 3).map(p => `
                    <div class="mini-product glass-card" onclick="window.location.href='/store/${store.slug}'">
                        <img src="${p.image_url || 'https://placehold.co/160x120/2A4A6A/C0E0FF?text=Product'}" onerror="this.src='https://placehold.co/160x120/2A4A6A/C0E0FF?text=Product'" alt="${p.name}">
                        <div class="mini-product-title">${p.name}</div>
                        <div class="mini-product-price price-value" data-syp="${p.base_price}">${window.formatPrice ? window.formatPrice(p.base_price) : p.base_price + ' ل.س'}</div>
                    </div>
                `).join('');
            }
            
            if (window.updateAllPrices) {
                window.updateAllPrices();
            }
        } catch(e) { 
            console.error(e); 
            document.getElementById('storesContainer').innerHTML = '<div class="empty-stores glass-card">✨ خطأ في تحميل المتاجر ✨</div>';
        }
    }
    
    // ========== تهيئة العملة ==========
    async function initCurrency() {
        if (window.loadExchangeRate) {
            await window.loadExchangeRate();
        }
        if (window.updateAllPrices) {
            window.updateAllPrices();
        }
        const currencyText = document.getElementById('globalCurrencyText');
        if (currencyText) {
            const currentCurrency = localStorage.getItem('helaxia_currency') || 'SYP';
            currencyText.innerText = currentCurrency === 'SYP' ? 'ل.س' : '$';
        }
    }
    
    // تحميل المدن أولاً، ثم استعادة الاختيار السابق، ثم تحميل المتاجر
    async function init() {
        await loadCities();
        
        // استعادة المدينة المختارة سابقاً
        const savedCity = localStorage.getItem('selectedCity');
        if (savedCity) {
            try {
                const city = JSON.parse(savedCity);
                selectedCityId = city.id;
                currentCityFilter = city.id;
                document.getElementById('selectedCityName').innerText = city.name;
            } catch(e) {}
        } else {
            // إذا لم يختر مدينة، أظهر رسالة تحذير
            const warning = document.getElementById('warningBanner');
            if (warning) warning.style.display = 'block';
        }
        
        await loadStores();
        
        // إغلاق القائمة عند النقر خارجها
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('cityDropdown');
            const btn = document.getElementById('cityFilterBtn');
            if (dropdown && btn && !btn.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.style.display = 'none';
            }
        });
    }
    
    init();
    updateCartCount();
    initCurrency();
</script>
</body>
</html>
